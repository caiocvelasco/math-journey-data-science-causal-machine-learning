project:
  type: website
  output-dir: _book

website:
  title: "Foundations of Data Science & Causal ML: A Mathematical Journey"
  sidebar:
    contents:
      - index.qmd
      - chapters/about.qmd
      - chapters/00_ch00.qmd
      - chapters/01_ch01.qmd
      - glossary/glossary.qmd
    style: docked
    search: true
    collapse-level: 1
  google-analytics: "GT-W6N7KSB2"   # "G-B19JRNKWM0" - GA4 measurement ID for the book (Quarto will handle the gtag injection)

format:
  html:
    theme: flatly    # cosmo or litera, simplex, flatly for readability
    code-link: true
    math: true
    toc: true
    toc-location: right
    service-workers: false
    code-copy: true
    fontsize: 1.1em
    linestretch: 1.6
    grid:
      sidebar-width: 280px
      body-width: 1000px
      margin-width: 280px
      gutter-width: 1.5rem

number-sections: false
